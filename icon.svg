<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8f55a"/>
      <stop offset="100%" style="stop-color:#8fd63a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="256" y1="60" x2="256" y2="452" stroke="#ffffff08" stroke-width="1"/>
  <line x1="60" y1="256" x2="452" y2="256" stroke="#ffffff08" stroke-width="1"/>
  <!-- Clock circle -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#2a2a4a" stroke-width="16"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#accent)" stroke-width="8" stroke-dasharray="420 640" stroke-dashoffset="-30" stroke-linecap="round"/>
  <!-- Hour ticks -->
  <g stroke="#3a3a5a" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="108" x2="256" y2="128"/>
    <line x1="256" y1="384" x2="256" y2="404"/>
    <line x1="108" y1="256" x2="128" y2="256"/>
    <line x1="384" y1="256" x2="404" y2="256"/>
  </g>
  <!-- Clock hands -->
  <line x1="256" y1="256" x2="256" y2="152" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="318" y2="290" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="url(#accent)"/>
  <circle cx="256" cy="256" r="6" fill="#0d0d1a"/>
</svg>
