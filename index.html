<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeLog">
<meta name="theme-color" content="#0f0f1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Time Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f1a;
  --surface: #181826;
  --card: #1e1e30;
  --border: #2a2a42;
  --accent: #c8f55a;
  --accent-dim: #8ab53a;
  --accent2: #5af5c8;
  --text: #eeeef8;
  --muted: #5c5c7a;
  --danger: #f55a7a;
  --safe: inset 0 env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
}

/* ── App Shell ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
}

/* ── Scrollable content ── */
#scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(32px + env(safe-area-inset-bottom));
}

/* ── Header ── */
.app-header {
  padding: 16px 20px 8px;
  padding-top: calc(16px + env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.app-header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
  text-transform: uppercase;
}

.header-sub {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── Calendar ── */
.cal-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.cal-month {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.04em;
}

.cal-nav-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s;
}
.cal-nav-btn:active { color: var(--accent); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.cal-day-label {
  text-align: center;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding-bottom: 6px;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  padding: 2px;
  transition: background 0.12s;
}

.cal-day:active { background: var(--card); }

.cal-day.empty { pointer-events: none; }

.cal-day .day-num {
  font-size: 0.75rem;
  font-weight: 500;
  line-height: 1;
}

.cal-day .day-hrs {
  font-size: 0.52rem;
  color: var(--accent-dim);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

.cal-day.today .day-num {
  color: var(--bg);
  background: var(--accent);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cal-day.selected {
  background: var(--card);
  border: 1px solid var(--border);
}

.cal-day.has-entry .day-hrs { color: var(--accent); }

.cal-day.other-month .day-num { color: var(--border); }

/* ── Entry Form ── */
.form-section {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.form-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.selected-date-label {
  font-size: 0.82rem;
  color: var(--accent2);
  margin-bottom: 16px;
  font-weight: 500;
}

.time-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

.field-group label {
  display: block;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}

input[type="time"] {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 1.05rem;
  padding: 12px 12px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

input[type="time"]:focus { border-color: var(--accent); }

.result-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 14px;
}

.result-row .rl { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.result-row .rv { font-size: 1.1rem; color: var(--accent2); font-weight: 500; }

.btn-save {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #0a0a10;
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-save:active { opacity: 0.85; transform: scale(0.98); }
.btn-save.saved {
  background: var(--card);
  color: var(--accent);
  border: 1px solid var(--accent);
}

/* ── Log List ── */
.log-section {
  padding: 20px;
}

.log-header-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}

.log-header-row h2 {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.week-total {
  font-size: 0.7rem;
  color: var(--accent);
  letter-spacing: 0.04em;
}

.log-empty {
  text-align: center;
  color: var(--muted);
  font-size: 0.72rem;
  padding: 24px 0;
  letter-spacing: 0.05em;
}

.log-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeUp 0.22s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.log-item .li-date { font-size: 0.82rem; font-weight: 500; color: var(--text); }
.log-item .li-times { font-size: 0.62rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.03em; }
.log-item .li-hours { font-size: 1.1rem; color: var(--accent); font-weight: 500; text-align: right; }
.log-item .li-hrs-lbl { font-size: 0.58rem; color: var(--muted); text-align: right; letter-spacing: 0.08em; text-transform: uppercase; }

.btn-del {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 4px 6px;
  margin-left: 10px;
  opacity: 0.4;
  transition: opacity 0.15s;
}
.btn-del:active { opacity: 1; }

/* iOS install banner */
.install-hint {
  margin: 0 20px 12px;
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.03em;
  line-height: 1.5;
}
.install-hint .hint-icon { font-size: 1.1rem; flex-shrink: 0; }
.install-hint .hint-close {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 2px 4px;
}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="app-header">
    <div>
      <h1>⏱ Time Log</h1>
    </div>
    <div class="header-sub" id="totalThisMonth"></div>
  </div>

  <!-- Scrollable content -->
  <div id="scroll-area">

    <!-- iOS install hint -->
    <div class="install-hint" id="installHint" style="display:none;margin-top:12px;">
      <span class="hint-icon">📲</span>
      <span>Tap <strong>Share</strong> → <strong>Add to Home Screen</strong> to install this app on your iPhone.</span>
      <button class="hint-close" onclick="dismissHint()">✕</button>
    </div>

    <!-- Calendar -->
    <div class="cal-section">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="shiftMonth(-1)">‹</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="shiftMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Entry form -->
    <div class="form-section">
      <div class="form-title">Log Hours</div>
      <div class="selected-date-label" id="selectedDateLabel">—</div>
      <div class="time-row">
        <div class="field-group">
          <label>Time In</label>
          <input type="time" id="inputIn">
        </div>
        <div class="field-group">
          <label>Time Out</label>
          <input type="time" id="inputOut">
        </div>
      </div>
      <div class="result-row">
        <span class="rl">Worked (−1hr lunch)</span>
        <span class="rv" id="previewHrs">—</span>
      </div>
      <button class="btn-save" id="btnSave" onclick="saveEntry()">Save Entry</button>
    </div>

    <!-- Log list -->
    <div class="log-section">
      <div class="log-header-row">
        <h2>All Entries</h2>
        <span class="week-total" id="weekTotal"></span>
      </div>
      <div id="logList"></div>
    </div>

  </div><!-- /scroll-area -->
</div><!-- /app -->

<script>
// ── State ──────────────────────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('timelog_v2') || '[]');
// entries: [{ id, date:'YYYY-MM-DD', timeIn:'HH:MM', timeOut:'HH:MM', hours:float }]

const todayStr = (() => {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
})();

let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-based
let selectedDate = todayStr;

// ── Helpers ────────────────────────────────────────────────────────
function calcHours(tIn, tOut) {
  const [h1,m1] = tIn.split(':').map(Number);
  const [h2,m2] = tOut.split(':').map(Number);
  return ((h2*60+m2) - (h1*60+m1) - 60) / 60;
}

function fmtHours(h) {
  if (!h || h <= 0) return '0h';
  const hrs = Math.floor(h);
  const mins = Math.round((h - hrs) * 60);
  return mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`;
}

function fmtDate(str) {
  const [y,m,d] = str.split('-');
  return new Date(+y, +m-1, +d).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function fmtDateShort(str) {
  const [y,m,d] = str.split('-');
  return new Date(+y, +m-1, +d).toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function entryForDate(date) {
  return entries.find(e => e.date === date);
}

function save() {
  localStorage.setItem('timelog_v2', JSON.stringify(entries));
}

// ── Calendar ───────────────────────────────────────────────────────
function renderCalendar() {
  const label = new Date(calYear, calMonth).toLocaleDateString('en-US', {month:'long', year:'numeric'});
  document.getElementById('calMonthLabel').textContent = label;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day labels
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(dl => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = dl;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  // Prev month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    const el = document.createElement('div');
    el.className = 'cal-day empty other-month';
    el.innerHTML = `<span class="day-num">${day}</span>`;
    grid.appendChild(el);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear + '-' +
      String(calMonth+1).padStart(2,'0') + '-' +
      String(d).padStart(2,'0');
    const entry = entryForDate(dateStr);
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedDate;

    const el = document.createElement('div');
    el.className = 'cal-day' +
      (isToday ? ' today' : '') +
      (isSelected ? ' selected' : '') +
      (entry ? ' has-entry' : '');

    el.innerHTML = `<span class="day-num">${d}</span>` +
      (entry ? `<span class="day-hrs">${fmtHours(entry.hours)}</span>` : '');

    el.addEventListener('click', () => selectDate(dateStr));
    grid.appendChild(el);
  }

  // Next month padding
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty other-month';
    el.innerHTML = `<span class="day-num">${d}</span>`;
    grid.appendChild(el);
  }

  updateMonthTotal();
}

function shiftMonth(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
}

function updateMonthTotal() {
  const monthStr = calYear + '-' + String(calMonth+1).padStart(2,'0');
  const total = entries
    .filter(e => e.date.startsWith(monthStr))
    .reduce((s,e) => s + e.hours, 0);
  document.getElementById('totalThisMonth').textContent =
    total > 0 ? fmtHours(total) + ' this month' : '';
}

// ── Date Selection ─────────────────────────────────────────────────
function selectDate(dateStr) {
  selectedDate = dateStr;
  document.getElementById('selectedDateLabel').textContent = fmtDate(dateStr);

  const existing = entryForDate(dateStr);
  const btnSave = document.getElementById('btnSave');

  if (existing) {
    document.getElementById('inputIn').value  = existing.timeIn;
    document.getElementById('inputOut').value = existing.timeOut;
    document.getElementById('previewHrs').textContent = fmtHours(existing.hours);
    btnSave.textContent = 'Update Entry';
    btnSave.className = 'btn-save saved';
  } else {
    document.getElementById('inputIn').value  = '';
    document.getElementById('inputOut').value = '';
    document.getElementById('previewHrs').textContent = '—';
    btnSave.textContent = 'Save Entry';
    btnSave.className = 'btn-save';
  }

  renderCalendar(); // re-render to show selection highlight
  // scroll form into view
  document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Live preview ───────────────────────────────────────────────────
['inputIn','inputOut'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePreview);
});

function updatePreview() {
  const tIn  = document.getElementById('inputIn').value;
  const tOut = document.getElementById('inputOut').value;
  const el = document.getElementById('previewHrs');
  if (tIn && tOut) {
    const h = calcHours(tIn, tOut);
    el.textContent = h > 0 ? fmtHours(h) : 'Check times';
    el.style.color = h > 0 ? 'var(--accent2)' : 'var(--danger)';
  } else {
    el.textContent = '—';
    el.style.color = 'var(--accent2)';
  }
}

// ── Save ───────────────────────────────────────────────────────────
function saveEntry() {
  const tIn  = document.getElementById('inputIn').value;
  const tOut = document.getElementById('inputOut').value;
  if (!tIn || !tOut) { alert('Please enter both time in and time out.'); return; }
  const h = calcHours(tIn, tOut);
  if (h <= 0) { alert('Time out must be at least 1 hour after time in.'); return; }

  // Remove existing entry for this date if any
  entries = entries.filter(e => e.date !== selectedDate);
  entries.push({ id: Date.now(), date: selectedDate, timeIn: tIn, timeOut: tOut, hours: h });
  entries.sort((a,b) => b.date.localeCompare(a.date));

  save();
  renderCalendar();
  renderLog();
  selectDate(selectedDate); // refresh button state
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  renderCalendar();
  renderLog();
  selectDate(selectedDate);
}

// ── Log list ───────────────────────────────────────────────────────
function renderLog() {
  const list = document.getElementById('logList');

  if (!entries.length) {
    list.innerHTML = '<p class="log-empty">No entries yet — tap a date above.</p>';
    document.getElementById('weekTotal').textContent = '';
    return;
  }

  // Week total
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  const weekStr = weekStart.toISOString().split('T')[0];
  const weekHrs = entries.filter(e => e.date >= weekStr).reduce((s,e) => s+e.hours, 0);
  document.getElementById('weekTotal').textContent =
    weekHrs > 0 ? `This week: ${fmtHours(weekHrs)}` : '';

  list.innerHTML = entries.map(e => `
    <div class="log-item">
      <div>
        <div class="li-date">${fmtDate(e.date)}</div>
        <div class="li-times">${e.timeIn} → ${e.timeOut}</div>
      </div>
      <div style="display:flex;align-items:center">
        <div>
          <div class="li-hours">${fmtHours(e.hours)}</div>
          <div class="li-hrs-lbl">worked</div>
        </div>
        <button class="btn-del" onclick="deleteEntry(${e.id})" title="Delete">✕</button>
      </div>
    </div>
  `).join('');
}

// ── iOS install hint ───────────────────────────────────────────────
function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function isStandalone() {
  return window.navigator.standalone === true;
}
function dismissHint() {
  localStorage.setItem('hintDismissed', '1');
  document.getElementById('installHint').style.display = 'none';
}

if (isIOS() && !isStandalone() && !localStorage.getItem('hintDismissed')) {
  document.getElementById('installHint').style.display = 'flex';
}

// ── Service Worker ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Init ───────────────────────────────────────────────────────────
selectDate(todayStr);
renderLog();
</script>
</body>
</html>
